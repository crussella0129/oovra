<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>oovra-gui</title>

  <!-- Trunk compiles the bin target to WASM and injects the loader. -->
  <link data-trunk rel="rust" data-bin="oovra-gui" data-wasm-opt="2" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #1a1a1a;
      color: #eeeeee;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    #the_canvas_id {
      width: 100%;
      height: 100%;
      display: block;
    }
    #loading_text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.05rem;
      color: #cccccc;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="the_canvas_id"></canvas>
  <div id="loading_text">Loading oovra-gui…</div>
</body>
</html>
